name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - chore/**
      - feat/**
      - fix/**
      - refactor/**

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Workspace e2e
        run: npm run test:e2e -- workspace.e2e-spec.ts
